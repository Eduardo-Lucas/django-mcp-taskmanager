<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a1a1a; }

    button {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .error {
      background: #fff0f0;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Task Manager</h1>
    <p class="subtitle">Sign in to continue</p>

    {% if form.errors %}
      <div class="error">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" id="id_username" name="username" autofocus>

      <label for="id_password">Password</label>
      <input type="password" id="id_password" name="password">

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
